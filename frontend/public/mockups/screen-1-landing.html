<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOLY — Launch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, #1a0a2e 0%, #0d0d1a 55%, #000010 100%);
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Star field */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle var(--d, 3s) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--lo, 0.1); transform: scale(1); }
      to   { opacity: var(--hi, 0.8); transform: scale(1.3); }
    }

    /* Ambient glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 600px; height: 600px; background: #7c3aed; top: -150px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #2563eb; bottom: -100px; right: -50px; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 60%; animation-delay: -3s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px, 20px); } }

    /* Layout */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
      padding: 40px 24px;
    }

    /* Ethereum crystal */
    .crystal-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .crystal {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #818cf8 0%, #3b82f6 40%, #06b6d4 100%);
      clip-path: polygon(50% 0%, 100% 38%, 80% 100%, 20% 100%, 0% 38%);
      filter: drop-shadow(0 0 20px rgba(99,102,241,0.8)) drop-shadow(0 0 40px rgba(59,130,246,0.4));
    }
    .crystal-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(139, 92, 246, 0.4);
      animation: ring-pulse 2.5s ease-in-out infinite;
    }
    .crystal-ring-2 {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      border: 1px solid rgba(59, 130, 246, 0.2);
      animation: ring-pulse 2.5s ease-in-out infinite 0.8s;
    }
    @keyframes ring-pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 0.2; }
    }

    /* SOLY wordmark */
    .wordmark {
      text-align: center;
    }
    .wordmark h1 {
      font-size: clamp(72px, 12vw, 140px);
      font-weight: 900;
      letter-spacing: 0.18em;
      background: linear-gradient(135deg, #ffffff 0%, #c4b5fd 50%, #93c5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      filter: drop-shadow(0 0 40px rgba(139,92,246,0.4));
    }
    .wordmark .tagline {
      margin-top: 12px;
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }

    /* CTA button */
    .cta-wrap {
      position: relative;
      display: inline-block;
    }
    .cta-btn {
      position: relative;
      padding: 16px 48px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      background: rgba(139, 92, 246, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 92, 246, 0.5);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
      text-decoration: none;
      display: inline-block;
    }
    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(59,130,246,0.1));
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: inherit;
    }
    .cta-btn:hover::before { opacity: 1; }
    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 32px rgba(139,92,246,0.5), 0 0 0 1px rgba(139,92,246,0.3);
      border-color: rgba(139,92,246,0.8);
    }
    .cta-glow {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 160px;
      height: 30px;
      background: rgba(139,92,246,0.4);
      filter: blur(20px);
      border-radius: 50%;
      animation: glow-pulse 2s ease-in-out infinite;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) scaleX(1); }
      50% { opacity: 0.7; transform: translateX(-50%) scaleX(1.2); }
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 32px;
      align-items: center;
    }
    .stat-pill {
      padding: 8px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.05em;
    }
    .stat-pill span { color: rgba(139,92,246,0.9); font-weight: 600; }

    /* Circuit lines bottom */
    .circuit {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      pointer-events: none;
      opacity: 0.12;
    }

    /* Nav */
    .nav-hint {
      position: fixed;
      bottom: 28px;
      right: 32px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.1em;
    }
    .nav-hint a { color: rgba(139,92,246,0.7); text-decoration: none; }
    .nav-hint a:hover { color: rgba(139,92,246,1); }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" id="stars"></div>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Main content -->
  <main class="page">
    <div class="crystal-wrap">
      <div class="crystal-ring"></div>
      <div class="crystal-ring-2"></div>
      <div class="crystal"></div>
    </div>

    <div class="wordmark">
      <h1>SOLY</h1>
      <p class="tagline">Your AI Coding Assistant for Web3</p>
    </div>

    <div class="cta-wrap">
      <a class="cta-btn" href="./screen-2-chat-input.html">Launch Assistant</a>
      <div class="cta-glow"></div>
    </div>

    <div class="stats-row">
      <div class="stat-pill">Powered by <span>GPT-4o</span></div>
      <div class="stat-pill"><span>LSP0–LSP28</span> Support</div>
      <div class="stat-pill">Solidity <span>0.4–0.8+</span></div>
    </div>
  </main>

  <!-- Circuit SVG -->
  <svg class="circuit" viewBox="0 0 1440 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 80 H 200 L 240 40 H 400 L 440 80 H 600 L 640 40 H 900 L 940 80 H 1100 L 1140 40 H 1440" stroke="rgba(139,92,246,1)" stroke-width="1"/>
    <path d="M0 100 H 100 L 140 60 H 320 L 360 100 H 520 L 560 60 H 800 L 840 100 H 1000 L 1040 60 H 1440" stroke="rgba(59,130,246,0.8)" stroke-width="0.8"/>
    <circle cx="240" cy="40" r="3" fill="rgba(139,92,246,0.8)"/>
    <circle cx="640" cy="40" r="3" fill="rgba(139,92,246,0.8)"/>
    <circle cx="1140" cy="40" r="3" fill="rgba(139,92,246,0.8)"/>
    <circle cx="360" cy="100" r="2" fill="rgba(59,130,246,0.6)"/>
    <circle cx="840" cy="100" r="2" fill="rgba(59,130,246,0.6)"/>
  </svg>

  <p class="nav-hint">Screen 1 / 3 → <a href="./screen-2-chat-input.html">Next →</a></p>

  <script>
    // Generate stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      star.style.cssText = `
        width: ${size}px; height: ${size}px;
        top: ${Math.random() * 100}%; left: ${Math.random() * 100}%;
        --d: ${2 + Math.random() * 4}s;
        --lo: ${0.05 + Math.random() * 0.15};
        --hi: ${0.4 + Math.random() * 0.6};
        animation-delay: -${Math.random() * 5}s;
      `;
      container.appendChild(star);
    }
  </script>
</body>
</html>
